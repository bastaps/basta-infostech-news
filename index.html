<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basta-InfosTech. - Presse TIC & Télécoms Algérie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Ajout du moteur de rendu Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #1a1a2e; --secondary: #16213e; --accent: #0f3460;
            --highlight: #e94560; --text: #f5f5f5; --text-muted: #b8b8b8;
            --card-bg: #252542; --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--primary); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        body.rtl { direction: rtl; font-family: 'Noto Kufi Arabic', sans-serif; }

        /* TOP BAR */
        .top-bar { background: #0a0a1a; padding: 6px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-bar-content { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); }
        .top-socials a { color: var(--text-muted); margin-left: 15px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .top-socials a:hover { color: var(--highlight); }

        /* HEADER ULTRA-COMPACT */
        header { background: var(--primary); padding: 10px 0 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-content { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        
        .header-main-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 5px; 
            direction: ltr !important; 
        }
        
        .header-spacer { flex: 1; }
        .logo { flex: 2; text-align: center; }
        .logo h1 { font-size: 34px; font-family: 'Playfair Display'; color: white; cursor: pointer; letter-spacing: -1px; }

        .header-actions { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            justify-content: flex-end; 
        }

        .search-box { background: var(--card-bg); border-radius: 20px; padding: 2px 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { background: none; border: none; color: white; padding: 4px; outline: none; font-size: 12px; width: 130px; }
        
        .lang-toggle { display: flex; background: rgba(255,255,255,0.05); padding: 2px; border-radius: 20px; }
        .lang-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 10px; border-radius: 15px; font-weight: 800; font-size: 10px; }
        .lang-btn.active { background: var(--highlight); color: white; }

        /* NAVIGATION */
        nav { display: flex; gap: 20px; justify-content: center; padding: 5px 0; }
        nav a { font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        nav a.active { color: var(--highlight); }

        /* TICKER */
        .breaking-bar { background: var(--highlight); color: white; overflow: hidden; padding: 8px 0; white-space: nowrap; font-weight: bold; font-size: 13px; }
        .ticker-wrapper { display: inline-block; animation: ticker 90s linear infinite; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .ticker-item { display: inline-block; margin-right: 50px; }

        /* SECTIONS VUES */
        #homeView, #articleView { max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        /* ARTICLE VIEW - Mise en forme Markdown */
        .article-container { max-width: 900px; margin: 0 auto; background: var(--card-bg); border-radius: 25px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .article-hero-img { width: 100%; height: 450px; object-fit: cover; }
        .article-content-body { padding: 40px; }
        .back-btn { background: var(--highlight); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
        
        /* Style du texte Markdown */
        #viewContent h2, #viewContent h3 { margin: 25px 0 15px 0; color: white; }
        #viewContent p { margin-bottom: 15px; line-height: 1.8; font-size: 1.1rem; color: #e0e0e0; }
        #viewContent ul { margin-left: 20px; margin-bottom: 15px; }

        /* GRID & CARDS */
        .hero { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .hero-main { position: relative; border-radius: 20px; overflow: hidden; height: 450px; cursor: pointer; background: #000; }
        .hero-main img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .hero-main:hover img { transform: scale(1.05); opacity: 0.5; }
        .hero-content { position: absolute; bottom: 0; padding: 30px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; }
        
        .main-content { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .news-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .news-card:hover { transform: translateY(-5px); border-color: var(--highlight); }
        .news-img { height: 180px; width: 100%; object-fit: cover; }
        .news-body { padding: 20px; }

        footer { background: #0d0d1a; padding: 50px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; }
        .footer-grid { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; }
        .translate-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--highlight); color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 4000; font-size: 13px; }
        .translate-toast.show { display: block; }
        
        @media (max-width: 1000px) { 
            .hero, .main-content { grid-template-columns: 1fr; } 
            .news-grid { grid-template-columns: 1fr; }
            .header-main-row { flex-direction: column; gap: 10px; }
            .header-spacer { display: none; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-content">
        <div id="liveTime"></div>
        <div class="top-socials">
            <a href="#">Facebook</a> <a href="#">Youtube</a> <a href="#">Instagram</a>
        </div>
    </div>
</div>

<header>
    <div class="header-content">
        <div class="header-main-row">
            <div class="header-spacer"></div>
            <div class="logo">
                <h1 onclick="goHome()">Basta-InfosTech.</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="searchArticles()">
                    <span>🔍</span>
                </div>
                <div class="lang-toggle">
                    <button class="lang-btn active" id="btnFR" onclick="setLang('fr')">FR</button>
                    <button class="lang-btn" id="btnAR" onclick="setLang('ar')">عربي</button>
                </div>
            </div>
        </div>
        <nav id="mainNav">
            <a onclick="filterArticles('', this)" class="active">Accueil</a>
            <a onclick="filterArticles('Algérie', this)">Algérie</a>
            <a onclick="filterArticles('Télécoms', this)">Télécoms</a>
            <a onclick="filterArticles('Mobile', this)">Mobile</a>
        </nav>
    </div>
</header>

<div class="breaking-bar">
    <div class="ticker-wrapper" id="tickerContent">Chargement de l'actualité...</div>
</div>

<div id="homeView">
    <section class="hero" id="heroArea"></section>
    <div class="main-content">
        <main>
            <h2 id="sectionTitle" style="margin-bottom: 30px; font-family: 'Playfair Display'; border-left: 5px solid var(--highlight); padding-left: 15px;">Dernières Actualités</h2>
            <div class="news-grid" id="newsGrid"></div>
        </main>
        <aside>
            <div style="background: var(--card-bg); padding: 25px; border-radius: 20px;">
                <h3 id="asideTitle" style="margin-bottom: 20px; font-family: 'Playfair Display';">🔥 Tendances</h3>
                <div id="trendingList"></div>
            </div>
        </aside>
    </div>
</div>

<div id="articleView" style="display:none;">
    <button class="back-btn" onclick="goHome()">← Retour</button>
    <div class="article-container">
        <img id="viewImg" class="article-hero-img" src="">
        <div class="article-content-body">
            <span id="viewCat" style="background:var(--highlight);padding:3px 10px;border-radius:5px;font-size:11px;font-weight:bold;"></span>
            <h1 id="viewTitle" style="margin:15px 0;font-family:'Playfair Display'; font-size: 36px; line-height: 1.2;"></h1>
            <p id="viewMeta" style="color:var(--text-muted);font-size:13px;margin-bottom:25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;"></p>
            <div id="viewContent"></div> <!-- Rendu Markdown ici -->
        </div>
    </div>
</div>

<div class="translate-toast" id="translateToast">⌛ Traduction...</div>

<footer>
    <div class="footer-grid">
        <div><h2 style="font-family: 'Playfair Display'; margin-bottom:10px;">Basta-InfosTech.</h2><p style="font-size:13px; color:var(--text-muted);">Média spécialisé TIC en Algérie.</p></div>
        <div><h4 style="margin-bottom:15px;">Contact</h4><p style="font-size:13px; color:var(--text-muted);">Email: contact@basta-infostech-news.pages.dev</p></div>
    </div>
</footer>

<script>
    let allArticles = [];
    let filteredArticles = [];
    let currentLang = 'fr';

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('liveTime').innerText = now.toLocaleDateString('fr-FR', options);
    }
    setInterval(updateClock, 1000); updateClock();

    async function init() {
        const promises = [];
        // On cherche les articles de 1 à 15
        for(let i=1; i<=1000; i++) {
            promises.push(
                fetch(`articles/${i}.md`)
                .then(r => r.ok ? r.text().then(t => parseMD(t, i)) : null)
                .catch(() => null)
            );
        }
        const results = await Promise.all(promises);
        allArticles = results.filter(a => a !== null).sort((a, b) => new Date(b.date) - new Date(a.date));
        filteredArticles = [...allArticles];
        
        // Ticker Actu
        document.getElementById('tickerContent').innerHTML = allArticles.map(a => `<span class="ticker-item">● ${a.title}</span>`).join('');
        
        renderUI();
    }

    function parseMD(raw, id) {
        try {
            const match = raw.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
            if (!match) return null;
            const meta = {};
            match[1].split('\n').forEach(line => {
                const p = line.split(':');
                if (p.length >= 2) meta[p[0].trim().toLowerCase()] = p.slice(1).join(':').trim();
            });
            return {
                id,
                title: meta.titre || 'Sans titre',
                cat: meta.categorie || 'News',
                date: meta.date || '',
                time: meta.heure || '',
                image: meta.image || 'articles/images/1.jpg',
                excerpt: meta.extrait || '',
                content: match[2].trim()
            };
        } catch (e) { return null; }
    }

    async function renderUI() {
        if (filteredArticles.length === 0) {
            document.getElementById('newsGrid').innerHTML = "<p>Aucun article trouvé.</p>";
            return;
        }

        const data = [...filteredArticles];
        
        // Gestion Traduction Arabe
        if (currentLang === 'ar') {
            toggleToast(true);
            for (let a of data) {
                a.displayTitle = await translate(a.title, 'ar');
                a.displayExcerpt = await translate(a.excerpt, 'ar');
            }
            toggleToast(false);
        } else {
            for (let a of data) {
                a.displayTitle = a.title;
                a.displayExcerpt = a.excerpt;
            }
        }

        // Hero (L'article à la une)
        const top = data[0];
        document.getElementById('heroArea').innerHTML = `
            <div class="hero-main" onclick="openArticle(${top.id})">
                <img src="${top.image}">
                <div class="hero-content">
                    <span style="background:var(--highlight);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:bold;">${top.cat}</span>
                    <h2 style="font-size:28px;margin-top:10px;font-family:'Playfair Display';">${top.displayTitle}</h2>
                </div>
            </div>
            <div class="hero-side">
                ${data.slice(1, 4).map(a => `
                    <div style="cursor:pointer; margin-bottom:12px; padding:15px; background:var(--card-bg); border-radius:15px; border:1px solid rgba(255,255,255,0.05);" onclick="openArticle(${a.id})">
                        <small style="color:var(--highlight);font-weight:bold;font-size:10px;">${a.cat}</small>
                        <h4 style="margin-top:3px; font-size:14px;">${a.displayTitle}</h4>
                    </div>
                `).join('')}
            </div>
        `;

        // Grille secondaire
        document.getElementById('newsGrid').innerHTML = data.slice(1).map(a => `
            <div class="news-card" onclick="openArticle(${a.id})">
                <img src="${a.image}" class="news-img">
                <div class="news-body">
                    <span style="color:var(--highlight);font-size:10px;font-weight:bold;">${a.cat}</span>
                    <h3 style="margin:5px 0;font-family:'Playfair Display'; font-size:18px;">${a.displayTitle}</h3>
                    <p style="font-size:12px;color:var(--text-muted);">${a.displayExcerpt.substring(0, 100)}...</p>
                </div>
            </div>
        `).join('');

        // Sidebar Tendances
        document.getElementById('trendingList').innerHTML = allArticles.slice(0, 5).map((a, i) => `
            <div style="margin-bottom:15px;cursor:pointer;display:flex;gap:12px;align-items:center;" onclick="openArticle(${a.id})">
                <span style="font-size:20px;font-weight:800;color:var(--accent);">0${i+1}</span>
                <p style="font-size:12px;font-weight:600;">${a.title}</p>
            </div>
        `).join('');
    }

    async function openArticle(id) {
        const art = allArticles.find(a => a.id == id);
        if(!art) return;

        document.getElementById('homeView').style.display = 'none';
        document.getElementById('articleView').style.display = 'block';
        window.scrollTo(0, 0);

        document.getElementById('viewImg').src = art.image;
        document.getElementById('viewCat').innerText = art.cat;
        document.getElementById('viewTitle').innerText = art.title;
        document.getElementById('viewMeta').innerText = `Publié le ${art.date} à ${art.time}`;
        
        // UTILISATION DE MARKED POUR LE RENDU
        document.getElementById('viewContent').innerHTML = marked.parse(art.content);

        if (currentLang === 'ar') {
            toggleToast(true);
            const translatedTitle = await translate(art.title, 'ar');
            const translatedBody = await translate(art.content, 'ar');
            document.getElementById('viewTitle').innerText = translatedTitle;
            document.getElementById('viewContent').innerHTML = marked.parse(translatedBody);
            toggleToast(false);
        }
    }

    function goHome() {
        document.getElementById('articleView').style.display = 'none';
        document.getElementById('homeView').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function searchArticles() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(query) || a.content.toLowerCase().includes(query));
        renderUI();
    }

    function filterArticles(cat, el) {
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
        filteredArticles = cat ? allArticles.filter(a => a.cat.toLowerCase().includes(cat.toLowerCase())) : [...allArticles];
        goHome();
        renderUI();
    }

    async function setLang(l) {
        currentLang = l;
        document.body.classList.toggle('rtl', l === 'ar');
        document.getElementById('btnFR').classList.toggle('active', l === 'fr');
        document.getElementById('btnAR').classList.toggle('active', l === 'ar');
        renderUI();
    }

    async function translate(text, lang) {
        if (!text || lang === 'fr') return text;
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=fr&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            return data[0].map(s => s[0]).join('');
        } catch { return text; }
    }

    function toggleToast(show) { document.getElementById('translateToast').classList.toggle('show', show); }

    window.onload = init;
</script>

</body>
</html>
